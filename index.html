
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Futebol Virtual Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0f1c;
  color: white;
}

header {
  background: #111827;
  padding: 18px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.sub {
  text-align: center;
  color: #94a3b8;
  margin-top: 5px;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #1f2937;
  border-radius: 12px;
  padding: 15px;
}

.badge {
  display: inline-block;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
}

.green { background: #16a34a; }
.yellow { background: #ca8a04; }
.red { background: #dc2626; }

button {
  margin-top: 10px;
  width: 100%;
  padding: 8px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
}
</style>

</head>

<body>

<header>Futebol Virtual Pro</header>
<div class="sub">Painel de análises automáticas</div>

<div class="container">

<div class="card">
<h3>Time A vs Time B</h3>
<span class="badge green">Over 1.5</span>
<p>Entrada recomendada com alta probabilidade de gols.</p>
<button>Ver análise</button>
</div>

<div class="card">
<h3>Time C vs Time D</h3>
<span class="badge yellow">Ambas marcam</span>
<p>Jogo equilibrado com tendência ofensiva.</p>
<button>Ver análise</button>
</div>

<div class="card">
<h3>Time E vs Time F</h3>
<span class="badge red">Vitória simples</span>
<p>Entrada mais arriscada com odds maiores.</p>
<button>Ver análise</button>
</div>

</div>

</body>
</html>
