
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Futebol Virtual - Análises</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
  text-align: center;
}

header {
  background: #111827;
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

.card {
  background: #1f2937;
  margin: 15px auto;
  padding: 15px;
  max-width: 500px;
  border-radius: 10px;
  text-align: left;
}

.green { color: #22c55e; font-weight: bold; }
.yellow { color: #facc15; font-weight: bold; }
.red { color: #ef4444; font-weight: bold; }
</style>
</head>

<body>

<header>
Futebol Virtual - Painel de Análises
</header>

<div class="card">
<h3>Jogo 1</h3>
<p>Time A vs Time B</p>
<p>Probabilidade: <span class="green">Over 1.5 gols</span></p>
<p>Risco: <span class="yellow">Médio</span></p>
</div>

<div class="card">
<h3>Jogo 2</h3>
<p>Time C vs Time D</p>
<p>Probabilidade: <span class="green">Ambas marcam</span></p>
<p>Risco: <span class="red">Alto</span></p>
</div>

<div class="card">
<h3>Jogo 3</h3>
<p>Time E vs Time F</p>
<p>Probabilidade: <span class="green">Vitória Time E</span></p>
<p>Risco: <span class="yellow">Médio</span></p>
</div>

</body>
</html>
