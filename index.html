
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Site de Análises Esportivas</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #ffffff;
      text-align: center;
    }

    header {
      background: #1e293b;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 30px;
    }

    .card {
      background: #1e293b;
      margin: 15px auto;
      padding: 20px;
      max-width: 500px;
      border-radius: 10px;
    }

    .verde {
      color: #22c55e;
      font-weight: bold;
    }

    .amarelo {
      color: #facc15;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  Análises Esportivas Profissionais
</header>

<div class="container">

  <div class="card">
    <h2>Flamengo x Palmeiras</h2>
    <p>Palpite: <span class="verde">Over 1.5 gols</span></p>
    <p>Confiança: <span class="amarelo">Alta</span></p>
  </div>

  <div class="card">
    <h2>Corinthians x São Paulo</h2>
    <p>Palpite: <span class="verde">Ambas marcam</span></p>
    <p>Confiança: <span class="amarelo">Média</span></p>
  </div>

</div>

</body>
</html>
