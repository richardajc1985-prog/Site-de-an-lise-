<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pro Tipster Live</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #050814;
  color: white;
}

header {
  background: #0f172a;
  padding: 20px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.sub {
  text-align: center;
  color: #94a3b8;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
  margin-top: 15px;
  transition: 0.3s;
}

.tag {
  display: inline-block;
  padding: 5px 8px;
  border-radius: 6px;
  font-size: 12px;
  margin-top: 8px;
}

.green { background: #16a34a; }
.yellow { background: #ca8a04; }
.red { background: #dc2626; }

button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
}
</style>

</head>

<body>

<header>PRO TIPSTER LIVE</header>
<div class="sub">Jogos atualizando automaticamente (simulado)</div>

<div class="container" id="games"></div>

<script>
// SIMULAÇÃO DE JOGOS DINÂMICOS
const jogos = [
  {t1:"Flamengo", t2:"Palmeiras", tip:"Over 1.5", risk:"green", conf:78},
  {t1:"Corinthians", t2:"São Paulo", tip:"Ambas marcam", risk:"yellow", conf:65},
  {t1:"Grêmio", t2:"Inter", tip:"Under 2.5", risk:"red", conf:52},
  {t1:"Real Madrid", t2:"Barcelona", tip:"Over 2.5", risk:"green", conf:81}
];

function render() {
  const container = document.getElementById("games");
  container.innerHTML = "";

  jogos.forEach(j => {
    container.innerHTML += `
      <div class="card">
        <h3>${j.t1} vs ${j.t2}</h3>
        <span class="tag ${j.risk}">${j.tip}</span>
        <p>Confiança: ${j.conf}%</p>
        <button>Ver análise</button>
      </div>
    `;
  });
}

render();

// atualiza “simulado” a cada 5s
setInterval(() => {
  jogos.push({
    t1:"Time " + Math.floor(Math.random()*10),
    t2:"Time " + Math.floor(Math.random()*10),
    tip:"Over 1.5",
    risk:"green",
    conf:60 + Math.floor(Math.random()*30)
  });

  jogos.shift(); // remove antigo
  render();
}, 5000);

</script>

</body>
</html>
