<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pro Tipster Live</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #050814;
  color: white;
}

header {
  background: #0f172a;
  padding: 20px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.sub {
  text-align: center;
  color: #94a3b8;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
  margin-top: 15px;
}

.badge {
  display: inline-block;
  padding: 5px 8px;
  border-radius: 6px;
  font-size: 12px;
}

.green { background: #16a34a; }
.yellow { background: #ca8a04; }

button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
}
</style>

</head>

<body>

<header>PRO TIPSTER LIVE</header>
<div class="sub">Jogos reais + análises automáticas</div>

<div class="container" id="games"></div>

<script>

// 🔥 DADOS SIMULADOS (DEPOIS TROCAMOS POR API REAL)
const jogos = [
  {
    home: "Flamengo",
    away: "Palmeiras",
    tip: "Over 1.5 gols",
    conf: 78
  },
  {
    home: "Corinthians",
    away: "São Paulo",
    tip: "Ambas marcam",
    conf: 65
  },
  {
    home: "Real Madrid",
    away: "Barcelona",
    tip: "Over 2.5 gols",
    conf: 82
  }
];

function render() {
  const container = document.getElementById("games");
  container.innerHTML = "";

  jogos.forEach(j => {
    container.innerHTML += `
      <div class="card">
        <h3>${j.home} vs ${j.away}</h3>
        <span class="badge green">${j.tip}</span>
        <p>Confiança: ${j.conf}%</p>
        <button>Ver análise</button>
      </div>
    `;
  });
}

render();

</script>

</body>
</html>
